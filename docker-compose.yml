version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tuition_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tuition_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tuition_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    image: masegi/tuition-marketplace-be:latest
    container_name: tuition_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
